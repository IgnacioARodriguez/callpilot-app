name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check protected test assets
        run: npm run test:protected-assets

      - name: Check eval dataset policy
        run: npm run test:eval-datasets

      - name: Run tests
        run: npm test

      - name: Run core benchmark
        run: npm run benchmark:core

      - name: Build
        run: npm run build
